services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: qlc-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - qlc_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - qlc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty string makes frontend use relative URLs, proxied by nginx
        - VITE_API_URL=
    container_name: qlc-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - qlc-network

networks:
  qlc-network:
    driver: bridge

volumes:
  qlc_data:
    driver: local
